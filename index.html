<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>ZeloSMP Store</title>
    <meta name="description" content="ZeloSMP Store - Official store for the ZeloSMP community.">
    <meta name="author" content="ZeloSMP" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ZeloSMP Store">
    <meta property="og:description" content="ZeloSMP Store - Official store for the ZeloSMP community.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZeloSMP Store">
    <meta name="twitter:description" content="ZeloSMP Store - Official store for the ZeloSMP community.">
</head>

  <body>
    <script>
      // GitHub Pages SPA redirect decoder (pairs with public/404.html)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
